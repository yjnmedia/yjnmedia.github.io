<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>易将南传媒</title>

<style>
:root {
  --bg: #070b1a;
  --panel: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.14);
  --text: #eaf0ff;
  --muted: #9fb0e0;
  --brand: #4ec8ff;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:"Microsoft YaHei",sans-serif;
  color:var(--text);
  background:linear-gradient(135deg,#05070f,#0a1126);
}

/* ===== header ===== */
header{
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(12px);
  background:rgba(8,11,23,.7);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 20px;
}

nav a{
  color:var(--muted);
  margin-left:16px;
  text-decoration:none;
  transition:.3s;
  position:relative;
}

nav a.active,
nav a:hover{
  color:#fff;
}

nav a.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:100%;
  height:2px;
  background:var(--brand);
}

/* ===== layout ===== */
.container{
  width:min(1100px,92%);
  margin:auto;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  scroll-margin-top:120px;
  padding:40px 0;
}

/* ===== 卡片 ===== */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px;
}

/* ===== services ===== */
.services{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
}

/* ===== cases ===== */
.case-list{
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* ===== 动画 ===== */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:.8s ease;
}

.fade.show{
  opacity:1;
  transform:none;
}

/* ===== responsive ===== */
@media(max-width:900px){
  .services{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:640px){
  .services{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div>易将南传媒</div>
    <nav>
      <a href="#about">公司定位</a>
      <a href="#services">核心业务</a>
      <a href="#cases">增长案例</a>
      <a href="#contact">联系</a>
    </nav>
  </div>
</header>

<main class="container">

<section id="about" class="fade">
  <h1>新媒体内容增长专家</h1>
  <p>提供从内容到转化的一体化解决方案</p>
</section>

<section id="services" class="fade">
  <h2>核心业务</h2>
  <div class="services">
    <div class="card">账号代运营</div>
    <div class="card">短视频创意</div>
    <div class="card">直播增长</div>
  </div>
</section>

<section id="cases" class="fade">
  <h2>增长案例</h2>
  <div class="case-list">
    <div class="card">品牌A：曝光+220%</div>
    <div class="card">品牌B：GMV+168%</div>
    <div class="card">品牌C：成本-35%</div>
  </div>
</section>

<section id="contact" class="fade">
  <h2>合作联系</h2>
  <div class="card">
    电话：17338791468
    邮箱：yjn0423@126.com
  </div>
</section>

</main>

<script>
/* ===== 动态header高度适配 ===== */
function updateOffset(){
  const h = document.querySelector("header").offsetHeight;
  document.documentElement.style.scrollPaddingTop = h + "px";
}
window.addEventListener("load",updateOffset);
window.addEventListener("resize",updateOffset);

/* ===== 滚动动画 ===== */
const fades = document.querySelectorAll(".fade");
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add("show");
    }
  });
},{threshold:.2});

fades.forEach(el=>observer.observe(el));

/* ===== 导航高亮 ===== */
const sections = document.querySelectorAll("section");
const navLinks = document.querySelectorAll("nav a");

window.addEventListener("scroll",()=>{
  let current="";
  sections.forEach(sec=>{
    const top = sec.offsetTop - 150;
    if(scrollY >= top){
      current = sec.id;
    }
  });

  navLinks.forEach(a=>{
    a.classList.remove("active");
    if(a.getAttribute("href") === "#" + current){
      a.classList.add("active");
    }
  });
});
</script>

</body>
</html>
