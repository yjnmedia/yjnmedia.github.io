<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#070b1a;
  --text:#eaf0ff;
  --muted:#9fb0e0;
  --brand:#4ec8ff;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body{
  font-family:"Microsoft YaHei";
  color:var(--text);
  background:linear-gradient(135deg,#05070f,#0a1126);
}

/* header */
header{
  position:sticky;
  top:0;
  z-index:100;
  backdrop-filter:blur(10px);
  background:rgba(0,0,0,.6);
}

.header-inner{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
}

nav a{
  margin-left:12px;
  color:#aaa;
  text-decoration:none;
}

nav a.active{color:#fff}

/* 容器 */
.container{
  width:92%;
  max-width:1100px;
  margin:auto;
}

/* 🔥 关键修复 */
section{
  padding:60px 0;
  scroll-margin-top:100px;
}

/* 👉 只让首屏居中 */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

/* 卡片 */
.card{
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:14px;
  margin-top:12px;
}

/* services */
.services{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

/* cases */
.case-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* 动画 */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:.6s;
}
.fade.show{
  opacity:1;
  transform:none;
}

/* 响应式 */
@media(max-width:768px){
  .services{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div>易将南传媒</div>
    <nav>
      <a href="#about">公司定位</a>
      <a href="#services">核心业务</a>
      <a href="#cases">增长案例</a>
      <a href="#contact">联系</a>
    </nav>
  </div>
</header>

<main class="container">

<section id="about" class="hero fade">
  <h1>新媒体内容增长专家</h1>
  <p>提供从内容到转化的一体化解决方案</p>
</section>

<section id="services" class="fade">
  <h2>核心业务</h2>
  <div class="services">
    <div class="card">账号代运营</div>
    <div class="card">短视频创意</div>
    <div class="card">直播增长</div>
  </div>
</section>

<section id="cases" class="fade">
  <h2>增长案例</h2>
  <div class="case-list">
    <div class="card">品牌A：曝光+220%</div>
    <div class="card">品牌B：GMV+168%</div>
    <div class="card">品牌C：成本-35%</div>
  </div>
</section>

<section id="contact" class="fade">
  <h2>联系</h2>
  <div class="card">电话：138xxxx</div>
</section>

</main>

<script>
/* 动态header高度 */
function setOffset(){
  const h=document.querySelector("header").offsetHeight;
  document.documentElement.style.scrollPaddingTop=h+"px";
}
window.addEventListener("load",setOffset);
window.addEventListener("resize",setOffset);

/* 动画 */
const obs=new IntersectionObserver(e=>{
  e.forEach(i=>{
    if(i.isIntersecting){
      i.target.classList.add("show");
    }
  });
});
document.querySelectorAll(".fade").forEach(el=>obs.observe(el));

/* 导航高亮 */
const sections=document.querySelectorAll("section");
const links=document.querySelectorAll("nav a");

window.addEventListener("scroll",()=>{
  let cur="";
  sections.forEach(sec=>{
    if(scrollY>=sec.offsetTop-120){
      cur=sec.id;
    }
  });
  links.forEach(a=>{
    a.classList.remove("active");
    if(a.getAttribute("href")==="#"+cur){
      a.classList.add("active");
    }
  });
});
</script>

</body>
</html>
